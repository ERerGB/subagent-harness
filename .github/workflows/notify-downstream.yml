name: Notify Downstream Consumers

on:
  release:
    types: [published]

jobs:
  notify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Notify registered consumers
        env:
          GH_TOKEN: ${{ secrets.DOWNSTREAM_NOTIFY_TOKEN }}
        run: bash scripts/notify-downstream.sh
