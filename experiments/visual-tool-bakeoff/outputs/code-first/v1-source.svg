<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc">
  <title id="title">Build once. Run in every agentic environment.</title>
  <desc id="desc">A portable agent definition flows through subagent-compose into native artifacts for Cursor, Codex, Claude Code, and Production.</desc>
  <defs>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#26333A" opacity="0.52"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#000000" flood-opacity="0.24"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M1 1L9 5L1 9" fill="none" stroke="#56D6C7" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="1280" height="640" fill="#0B1115"/>
  <rect width="1280" height="640" fill="url(#grid)"/>
  <rect x="28" y="28" width="1224" height="584" rx="28" fill="none" stroke="#26333A"/>

  <g font-family="Arial, Helvetica, sans-serif">
    <text x="64" y="72" fill="#56D6C7" font-size="13" font-weight="700" letter-spacing="2.4">PORTABLE AGENT DEFINITIONS</text>
    <text x="64" y="119" fill="#F2F0EA" font-size="34" font-weight="700">Build once. Run in every agentic environment.</text>
    <text x="64" y="151" fill="#7C929F" font-size="15">One definition in. Native artifacts out.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="64" y="220" width="256" height="232" rx="22" fill="#111A1F" stroke="#33454E"/>
    <rect x="88" y="244" width="208" height="44" rx="12" fill="#17242A" stroke="#33454E"/>
    <circle cx="110" cy="266" r="5" fill="#56D6C7"/>
    <text x="126" y="272" fill="#F2F0EA" font-family="Menlo, Consolas, monospace" font-size="18" font-weight="700">*.agent.md</text>

    <rect x="88" y="310" width="208" height="116" rx="14" fill="#0E1519" stroke="#26333A"/>
    <path d="M112 335h67M112 357h132M112 379h104M112 401h119" stroke="#526772" stroke-width="7" stroke-linecap="round"/>
    <path d="M112 335h29M112 379h47" stroke="#56D6C7" stroke-width="7" stroke-linecap="round"/>
  </g>
  <text x="64" y="203" fill="#7C929F" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700" letter-spacing="1.8">DEFINITION</text>

  <path d="M340 336H408" stroke="#56D6C7" stroke-width="2" stroke-linecap="round" marker-end="url(#arrow)"/>
  <circle cx="356" cy="336" r="4" fill="#0B1115" stroke="#56D6C7" stroke-width="2"/>

  <g filter="url(#shadow)">
    <rect x="432" y="220" width="328" height="232" rx="22" fill="#111A1F" stroke="#3B5A60"/>
    <rect x="448" y="236" width="296" height="54" rx="13" fill="#173036" stroke="#3E6F72"/>
    <rect x="468" y="254" width="14" height="14" rx="3" fill="#56D6C7"/>
    <rect x="490" y="254" width="14" height="14" rx="3" fill="#56D6C7" opacity="0.62"/>
    <rect x="512" y="254" width="14" height="14" rx="3" fill="#56D6C7" opacity="0.32"/>
    <text x="546" y="270" fill="#F2F0EA" font-family="Menlo, Consolas, monospace" font-size="17" font-weight="700">subagent-compose</text>

    <rect x="456" y="310" width="280" height="116" rx="14" fill="#0E1519" stroke="#26333A"/>
    <path d="M482 338h70" stroke="#7C929F" stroke-width="7" stroke-linecap="round"/>
    <path d="M482 364h164" stroke="#526772" stroke-width="7" stroke-linecap="round"/>
    <path d="M482 390h113" stroke="#526772" stroke-width="7" stroke-linecap="round"/>
    <circle cx="684" cy="364" r="18" fill="#173036" stroke="#56D6C7"/>
    <path d="M677 364l5 5 10-11" fill="none" stroke="#56D6C7" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="432" y="203" fill="#7C929F" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700" letter-spacing="1.8">DETERMINISTIC COMPILER</text>

  <path d="M780 336H848" stroke="#56D6C7" stroke-width="2" stroke-linecap="round" marker-end="url(#arrow)"/>
  <circle cx="796" cy="336" r="4" fill="#0B1115" stroke="#56D6C7" stroke-width="2"/>

  <g filter="url(#shadow)">
    <rect x="872" y="196" width="344" height="280" rx="22" fill="#111A1F" stroke="#33454E"/>
    <g font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700">
      <rect x="896" y="220" width="296" height="48" rx="12" fill="#17242A" stroke="#33454E"/>
      <path d="M918 237h10v14h-10zM922 233h10v14h-4" fill="none" stroke="#56D6C7" stroke-width="1.5" stroke-linejoin="round"/>
      <text x="950" y="251" fill="#F2F0EA">Cursor</text>

      <rect x="896" y="282" width="296" height="48" rx="12" fill="#17242A" stroke="#33454E"/>
      <path d="M918 299h10v14h-10zM922 295h10v14h-4" fill="none" stroke="#56D6C7" stroke-width="1.5" stroke-linejoin="round"/>
      <text x="950" y="313" fill="#F2F0EA">Codex</text>

      <rect x="896" y="344" width="296" height="48" rx="12" fill="#17242A" stroke="#33454E"/>
      <path d="M918 361h10v14h-10zM922 357h10v14h-4" fill="none" stroke="#56D6C7" stroke-width="1.5" stroke-linejoin="round"/>
      <text x="950" y="375" fill="#F2F0EA">Claude Code</text>

      <rect x="896" y="406" width="296" height="48" rx="12" fill="#173036" stroke="#3E6F72"/>
      <path d="M918 423h10v14h-10zM922 419h10v14h-4" fill="none" stroke="#56D6C7" stroke-width="1.5" stroke-linejoin="round"/>
      <text x="950" y="437" fill="#F2F0EA">Production</text>
      <circle cx="1166" cy="430" r="5" fill="#56D6C7"/>
    </g>
  </g>
  <text x="872" y="179" fill="#7C929F" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700" letter-spacing="1.8">NATIVE ARTIFACTS</text>

  <g font-family="Arial, Helvetica, sans-serif" font-size="13">
    <text x="64" y="566" fill="#7C929F">Open protocol · Apache-2.0</text>
    <text x="1216" y="566" fill="#7C929F" text-anchor="end">github.com/ERerGB/subagent-harness</text>
  </g>
</svg>