<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc">
  <title id="title">Build once. Run in every agentic environment.</title>
  <desc id="desc">A portable agent definition flows through subagent-compose into native artifacts for Cursor, Codex, Claude Code, and Production.</desc>
  <defs>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#26333A" opacity="0.52"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#000000" flood-opacity="0.24"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M1 1L9 5L1 9" fill="none" stroke="#56D6C7" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="1280" height="640" fill="#0B1115"/>
  <rect width="1280" height="640" fill="url(#grid)"/>
  <rect x="28" y="28" width="1224" height="584" rx="28" fill="none" stroke="#26333A"/>

  <g font-family="Arial, Helvetica, sans-serif">
    <text x="64" y="72" fill="#56D6C7" font-size="13" font-weight="700" letter-spacing="2.4">PORTABLE AGENT DEFINITIONS</text>
    <text x="64" y="119" fill="#F2F0EA" font-size="34" font-weight="700">Build once. Run in every agentic environment.</text>
    <text x="64" y="151" fill="#7C929F" font-size="15">One definition in. Native artifacts out.</text>
  </g>

  <text x="64" y="199" fill="#7C929F" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700" letter-spacing="1.8">01 · AUTHOR</text>
  <g filter="url(#shadow)">
    <rect x="64" y="216" width="300" height="256" rx="20" fill="#10191E" stroke="#33454E"/>
    <path d="M64 258h300" stroke="#33454E"/>
    <circle cx="84" cy="237" r="4" fill="#526772"/>
    <circle cx="98" cy="237" r="4" fill="#526772"/>
    <circle cx="112" cy="237" r="4" fill="#56D6C7"/>
    <rect x="132" y="224" width="136" height="34" rx="8" fill="#17242A"/>
    <path d="M148 234h9l4 4v10h-13zM157 234v5h4" fill="none" stroke="#56D6C7" stroke-width="1.3" stroke-linejoin="round"/>
    <text x="170" y="245" fill="#F2F0EA" font-family="Menlo, Consolas, monospace" font-size="12" font-weight="700">*.agent.md</text>

    <rect x="76" y="272" width="276" height="184" rx="12" fill="#0D1519" stroke="#26333A"/>
    <path d="M108 272v184" stroke="#26333A"/>
    <g font-family="Menlo, Consolas, monospace" font-size="11.5">
      <g fill="#526772" text-anchor="end">
        <text x="98" y="298">1</text><text x="98" y="322">2</text><text x="98" y="346">3</text>
        <text x="98" y="370">4</text><text x="98" y="394">5</text><text x="98" y="418">6</text><text x="98" y="442">7</text>
      </g>
      <text x="120" y="298" fill="#7C929F">---</text>
      <text x="120" y="322" fill="#56D6C7">name:<tspan fill="#F2F0EA"> reviewer</tspan></text>
      <text x="120" y="346" fill="#56D6C7">model:<tspan fill="#F2F0EA"> inherit</tspan></text>
      <text x="120" y="370" fill="#56D6C7">tools:<tspan fill="#F2F0EA"> [read, grep]</tspan></text>
      <text x="120" y="394" fill="#7C929F">---</text>
      <text x="120" y="418" fill="#F2F0EA">Review the current</text>
      <text x="120" y="442" fill="#F2F0EA">diff for regressions.</text>
    </g>
  </g>

  <path d="M364 344H396" stroke="#56D6C7" stroke-width="2" stroke-linecap="round" marker-end="url(#arrow)"/>
  <circle cx="378" cy="344" r="4" fill="#0B1115" stroke="#56D6C7" stroke-width="2"/>

  <text x="408" y="199" fill="#7C929F" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700" letter-spacing="1.8">02 · COMPILE</text>
  <g filter="url(#shadow)">
    <rect x="408" y="216" width="310" height="256" rx="20" fill="#10191E" stroke="#3B5A60"/>
    <rect x="424" y="232" width="278" height="58" rx="13" fill="#173036" stroke="#3E6F72"/>
    <rect x="444" y="252" width="14" height="14" rx="3" fill="#56D6C7"/>
    <rect x="466" y="252" width="14" height="14" rx="3" fill="#56D6C7" opacity="0.62"/>
    <rect x="488" y="252" width="14" height="14" rx="3" fill="#56D6C7" opacity="0.32"/>
    <text x="520" y="268" fill="#F2F0EA" font-family="Menlo, Consolas, monospace" font-size="15" font-weight="700">subagent-compose</text>

    <rect x="424" y="308" width="278" height="146" rx="13" fill="#0D1519" stroke="#26333A"/>
    <g font-family="Menlo, Consolas, monospace" font-size="12">
      <circle cx="450" cy="336" r="6" fill="#173036" stroke="#56D6C7"/><text x="468" y="340" fill="#F2F0EA">parse definition</text>
      <circle cx="450" cy="372" r="6" fill="#173036" stroke="#56D6C7"/><text x="468" y="376" fill="#F2F0EA">validate schema</text>
      <circle cx="450" cy="408" r="6" fill="#56D6C7"/><text x="468" y="412" fill="#F2F0EA">emit artifacts</text>
    </g>
    <circle cx="662" cy="381" r="20" fill="#173036" stroke="#56D6C7"/>
    <path d="M653 381l6 6 13-15" fill="none" stroke="#56D6C7" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <circle cx="738" cy="344" r="5" fill="#0B1115" stroke="#56D6C7" stroke-width="2"/>
  <path d="M718 344h20" stroke="#56D6C7" stroke-width="2"/>
  <g fill="none" stroke="#3E6F72" stroke-width="1.7" stroke-linecap="round" marker-end="url(#arrow)">
    <path d="M742 344C798 344 816 244 888 244"/>
    <path d="M742 344C806 344 824 302 888 302"/>
    <path d="M742 344C806 344 824 360 888 360"/>
    <path d="M742 344C798 344 816 418 888 418"/>
  </g>
  <g fill="#56D6C7">
    <circle cx="783" cy="316" r="3" opacity="0.28"/><circle cx="804" cy="285" r="3" opacity="0.58"/><rect x="826" y="261" width="9" height="12" rx="2"/>
    <circle cx="792" cy="332" r="3" opacity="0.28"/><circle cx="818" cy="318" r="3" opacity="0.58"/><rect x="842" y="302" width="9" height="12" rx="2"/>
    <circle cx="792" cy="350" r="3" opacity="0.28"/><circle cx="818" cy="355" r="3" opacity="0.58"/><rect x="842" y="360" width="9" height="12" rx="2"/>
    <circle cx="783" cy="370" r="3" opacity="0.28"/><circle cx="804" cy="392" r="3" opacity="0.58"/><rect x="826" y="406" width="9" height="12" rx="2"/>
  </g>

  <text x="830" y="199" fill="#7C929F" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700" letter-spacing="1.8">03 · DEPLOY / RUN</text>
  <g filter="url(#shadow)" font-family="Arial, Helvetica, sans-serif">
    <g>
      <rect x="900" y="220" width="292" height="48" rx="12" fill="#17242A" stroke="#33454E"/>
      <text x="922" y="250" fill="#56D6C7" font-family="Menlo, Consolas, monospace" font-size="14" font-weight="700">{}</text>
      <text x="954" y="250" fill="#F2F0EA" font-size="15" font-weight="700">Cursor</text>
      <circle cx="1164" cy="244" r="9" fill="none" stroke="#56D6C7" opacity="0.24"/><circle cx="1164" cy="244" r="4" fill="#56D6C7"/>
    </g>
    <g>
      <rect x="900" y="278" width="292" height="48" rx="12" fill="#17242A" stroke="#33454E"/>
      <text x="922" y="308" fill="#56D6C7" font-family="Menlo, Consolas, monospace" font-size="14" font-weight="700">{}</text>
      <text x="954" y="308" fill="#F2F0EA" font-size="15" font-weight="700">Codex</text>
      <circle cx="1164" cy="302" r="9" fill="none" stroke="#56D6C7" opacity="0.24"/><circle cx="1164" cy="302" r="4" fill="#56D6C7"/>
    </g>
    <g>
      <rect x="900" y="336" width="292" height="48" rx="12" fill="#17242A" stroke="#33454E"/>
      <text x="922" y="366" fill="#56D6C7" font-family="Menlo, Consolas, monospace" font-size="14" font-weight="700">{}</text>
      <text x="954" y="366" fill="#F2F0EA" font-size="15" font-weight="700">Claude Code</text>
      <circle cx="1164" cy="360" r="9" fill="none" stroke="#56D6C7" opacity="0.24"/><circle cx="1164" cy="360" r="4" fill="#56D6C7"/>
    </g>
    <g>
      <rect x="900" y="394" width="292" height="48" rx="12" fill="#173036" stroke="#3E6F72"/>
      <text x="922" y="424" fill="#56D6C7" font-family="Menlo, Consolas, monospace" font-size="14" font-weight="700">{}</text>
      <text x="954" y="424" fill="#F2F0EA" font-size="15" font-weight="700">Production</text>
      <text x="1102" y="422" fill="#56D6C7" font-family="Menlo, Consolas, monospace" font-size="9" font-weight="700" letter-spacing="1">LIVE</text>
      <circle cx="1164" cy="418" r="9" fill="none" stroke="#56D6C7" opacity="0.34"/><circle cx="1164" cy="418" r="4" fill="#56D6C7"/>
    </g>
  </g>

  <g font-family="Arial, Helvetica, sans-serif" font-size="13">
    <text x="64" y="566" fill="#7C929F">Open protocol · Apache-2.0</text>
    <text x="1216" y="566" fill="#7C929F" text-anchor="end">github.com/ERerGB/subagent-harness</text>
  </g>
</svg>